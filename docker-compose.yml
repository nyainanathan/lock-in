services:
  lock-in:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lock-in
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database across container restarts/rebuilds
      - sqlite_data:/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/database.sqlite
      # JWT secret — override this in production!
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sqlite_data:
    driver: local